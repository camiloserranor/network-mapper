<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Mapper — Topology</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- Toolbar -->
    <header id="toolbar">
        <div class="toolbar-left">
            <h1 class="logo">⬡ Network Mapper</h1>
            <span id="live-indicator" class="live-indicator disconnected"><span class="live-dot"></span> Offline</span>
        </div>
        <div class="toolbar-center">
            <input type="text" id="search-input" placeholder="Search devices..." autocomplete="off">
        </div>
        <div class="toolbar-right">
            <div class="btn-group" id="layout-buttons">
                <button class="btn" data-layout="cose" title="Force-directed layout">
                    ◎ Force
                </button>
                <button class="btn active" data-layout="dagre" title="Hierarchical layout">
                    ☰ Hierarchy
                </button>
            </div>
            <div class="btn-group">
                <button class="btn" id="fit-btn" title="Fit to screen">⤢ Fit</button>
                <button class="btn" id="collapse-all-btn" title="Collapse all to switches only">⊟ Collapse</button>
                <button class="btn" id="vlan-group-btn" title="Group nodes by VLAN">▧ VLAN</button>
                <button class="btn" id="export-png-btn" title="Export as PNG image">🖼 PNG</button>
                <button class="btn" id="export-json-btn" title="Export topology as JSON">{ } JSON</button>
            </div>
        </div>
    </header>

    <!-- Tree navigation hint -->
    <div id="tree-hint" class="tree-hint">
        <span>💡 Double-click a switch to reveal connected hosts, then a host to see its VMs.</span>
        <button id="tree-hint-dismiss" class="btn-icon" title="Dismiss">✕</button>
    </div>

    <!-- Warning banner for partial failures -->
    <div id="warning-banner" class="hidden">
        <div class="warning-banner-content">
            <span class="warning-icon">⚠</span>
            <span id="warning-summary"></span>
            <button id="warning-toggle" class="btn-icon" title="Show details">▾</button>
            <button id="warning-dismiss" class="btn-icon" title="Dismiss">✕</button>
        </div>
        <div id="warning-details" class="hidden"></div>
    </div>

    <!-- Main content -->
    <div id="main">
        <!-- Inventory panel (left side) -->
        <aside id="inventory-panel">
            <div class="inventory-header">
                <h2>📋 Inventory</h2>
                <button id="inventory-toggle" class="btn-icon" title="Collapse panel">◀</button>
            </div>
            <div id="inventory-content">
                <div id="inventory-search-wrap">
                    <input type="text" id="inventory-search" placeholder="Filter inventory..." autocomplete="off">
                </div>
                <div id="inventory-groups"></div>
            </div>
        </aside>

        <!-- Graph canvas -->
        <div id="cy"></div>

        <!-- Floating popup card (anchored near clicked node) -->
        <div id="popup-card" class="hidden">
            <div class="popup-header">
                <span id="popup-title"></span>
                <button id="popup-close" class="btn-icon" title="Close">✕</button>
            </div>
            <div id="popup-body"></div>
            <div class="popup-footer">
                <button id="popup-expand-btn" class="btn btn-sm" title="Expand/collapse connected devices">⊞ Expand</button>
                <button id="popup-details-btn" class="btn btn-sm">More details →</button>
            </div>
        </div>

        <!-- Detail sidebar -->
        <aside id="sidebar" class="hidden">
            <div class="sidebar-header">
                <h2 id="sidebar-title">Details</h2>
                <button id="sidebar-close" class="btn-icon" title="Close">✕</button>
            </div>
            <div id="sidebar-content"></div>
        </aside>
    </div>

    <!-- Inventory expand tab (visible when inventory is collapsed) -->
    <div id="inventory-expand-btn" class="hidden" title="Show inventory">▶ Inventory</div>

    <!-- Error overlay -->
    <div id="error-overlay" class="hidden">
        <div class="error-card">
            <h2>⚠ No Topology Data</h2>
            <p id="error-message">Could not load topology.json</p>
            <button class="btn" onclick="location.reload()">Retry</button>
        </div>
    </div>

    <!-- Libraries (vendored, no CDN) -->
    <script src="/lib/cytoscape.min.js"></script>
    <script src="/lib/dagre.min.js"></script>
    <script src="/lib/cytoscape-dagre.min.js"></script>

    <!-- App modules -->
    <script src="/js/graph.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/popup.js"></script>
    <script src="/js/toolbar.js"></script>
    <script src="/js/live.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
