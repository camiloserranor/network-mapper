# Network Mapper Configuration
# Defines TOR switches to query for topology discovery.

# Global auth — inherited by all switches unless overridden per-switch.
# Use Key Vault URIs to avoid plaintext credentials:
#   username_keyvault: https://myvault.vault.azure.net/secrets/gnmi-username
#   password_keyvault: https://myvault.vault.azure.net/secrets/gnmi-password
# Or use env vars for dev/test:
#   username: "${GNMI_USER}"
#   password: "${GNMI_PASS}"
auth:
  username: "admin"
  password_keyvault: https://azurestack-network.vault.azure.net/secrets/Net-Admin/222d9bb58f644b78b1670caef1ac7358

switches:
  - name: TOR-1
    address: "100.100.81.129:8080" 
    platform: sonic

  - name: TOR-2
    address: "100.100.81.130:8080"
    platform: sonic    

    
tls:
  # Trust-On-First-Use: fetch and cache switch certs on first connection
  # tofu: true
  # cert_dir: ".certs"
  skip_verify: true   # Use instead of TOFU to skip all TLS verification
  # ca_cert: /path/to/ca.pem   # Use for explicit CA trust

collect:
  timeout_sec: 30     # Per-switch timeout
  parallel: 2         # Max concurrent switch connections
  skip_counters: false # Set true to skip interface counter collection

# deployment_json: C:\repos\networking\network-mapper\examples\sample-deployment.json
