# Network Mapper Configuration
# Defines TOR switches to query for topology discovery.

switches:
  - name: TOR-1
    address: "10.0.0.1:8080"
    # Supported platforms: sonic, nxos, dell-os10
    platform: sonic
    auth:
      username: admin
      password: "${SWITCH_PASSWORD}"

  - name: TOR-2
    address: "10.0.0.2:8080"
    platform: sonic
    auth:
      username: admin
      password: "${SWITCH_PASSWORD}"

tls:
  # Trust-On-First-Use: fetch and cache switch certs on first connection
  tofu: true
  cert_dir: ".certs"
  # skip_verify: true   # Use instead of TOFU to skip all TLS verification
  # ca_cert: /path/to/ca.pem   # Use for explicit CA trust

collect:
  timeout_sec: 30     # Per-switch timeout
  parallel: 2         # Max concurrent switch connections
  skip_counters: false # Set true to skip interface counter collection

# Optional: Azure Local deployment design JSON for topology enrichment.
# When provided, enriches discovered devices with authoritative hostnames,
# MAC addresses, and IP addresses from the deployment plan.
# deployment_json: /path/to/deployment.json
